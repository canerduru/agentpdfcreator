<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>RealShow AI - Multi-Page Edition</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Cinzel:wght@400;700&family=Roboto+Mono:wght@400;500;700&family=Oswald:wght@400;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                        classic: ['Cinzel', 'serif'],
                        mono: ['Roboto Mono', 'monospace'],
                        urban: ['Oswald', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- React Dependencies -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script>window.react = window.React;</script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react/dist/umd/lucide-react.min.js"></script>
    
    <!-- PDF Generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        .pdf-page {
            width: 794px;
            height: 1123px;
            overflow: hidden;
            position: relative;
            background: white;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const iconSet = window.LucideReact || window.lucideReact || window.lucide || {};
        const FallbackIcon = ({ className = '' }) => <span className={className} aria-hidden="true">•</span>;
        const asComponent = (value) => (typeof value === 'function' ? value : FallbackIcon);

        const Camera = asComponent(iconSet.Camera);
        const Home = asComponent(iconSet.Home);
        const Upload = asComponent(iconSet.Upload);
        const X = asComponent(iconSet.X);
        const FileText = asComponent(iconSet.FileText);
        const Layout = asComponent(iconSet.Layout);
        const Download = asComponent(iconSet.Download);
        const Check = asComponent(iconSet.Check);
        const ImageIcon = asComponent(iconSet.Image);
        const Palette = asComponent(iconSet.Palette);
        const ChevronDown = asComponent(iconSet.ChevronDown);
        const Loader2 = asComponent(iconSet.Loader2);

        // --- Templates ---

        // Helper: Gallery Page (1 cover + 8 gallery = 9 total; page 2 shows 8 equal-sized images)
        const GalleryPage = ({ images, title, agent, language = 'en', theme = 'light', font = 'sans' }) => {
            const displayImages = images.slice(1); // Skip hero (index 0), show slots 1–8
            const bgClass = theme === 'dark' ? 'bg-zinc-900 text-white' : 'bg-white text-slate-900';

            return (
                <div className={`pdf-page ${bgClass} font-${font} flex flex-col p-12`}>
                    <div className="border-b-2 border-current pb-4 mb-6 flex justify-between items-end shrink-0">
                        <h2 className="text-3xl font-light uppercase tracking-widest">{t(language, 'photoGalleryTitle')}</h2>
                        <span className="text-sm opacity-60">{title}</span>
                    </div>
                    
                    <div className="grid grid-cols-2 grid-rows-4 gap-4 flex-1 min-h-0 overflow-hidden">
                        {displayImages.slice(0, 8).map((img, i) => (
                            <div key={i} className="relative overflow-hidden rounded-sm bg-slate-200 min-h-0 aspect-video">
                                <img src={img} alt={`Gallery ${i+1}`} className="w-full h-full object-cover object-center" />
                            </div>
                        ))}
                        {displayImages.length === 0 && (
                            <div className="col-span-4 row-span-2 flex items-center justify-center opacity-20 border-2 border-dashed border-current rounded-lg min-h-0">
                                <span className="text-xl">{t(language, 'photoGalleryEmpty')}</span>
                            </div>
                        )}
                    </div>
                    
                    <TemplateFooter agent={agent} page="Page 02" theme={theme} />
                </div>
            );
        };

        const ModernistTemplate = ({ property, images, agent, language = 'en', listingType, propertyType }) => (
            <>
                {/* Page 1 */}
                <div className="pdf-page bg-white text-slate-900 flex flex-col font-sans">
                    <div className="h-[55%] w-full bg-slate-200 relative overflow-hidden">
                        <CoverBadge listingType={listingType} propertyType={propertyType} language={language} dark={false} />
                        <img src={images[0]} alt="Main" className="w-full h-full object-cover" />
                        <div className="absolute bottom-0 left-0 bg-white/95 p-8 backdrop-blur-sm m-8 max-w-xl shadow-lg border-l-8 border-blue-600">
                            <h1 className="text-3xl font-extrabold uppercase tracking-tight mb-2 text-slate-900">{property.title}</h1>
                            <p className="text-lg text-slate-600 font-medium">{property.address}</p>
                        </div>
                    </div>
                    <div className="p-12 flex-1 flex flex-col justify-between">
                        <div className="flex justify-between items-end border-b-4 border-slate-900 pb-6 mb-8">
                            <h2 className="text-6xl font-black tracking-tighter text-blue-600">{property.price}</h2>
                            <div className="text-right">
                                <p className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-1">{t(language, 'specifications')}</p>
                                <p className="text-2xl font-semibold text-slate-800">{property.size}</p>
                            </div>
                        </div>
                        <div className="flex-1">
                            <h3 className="text-lg font-bold uppercase mb-6 text-slate-800 flex items-center gap-2">{t(language, 'propertyHighlights')}</h3>
                            <ul className="space-y-3">
                                {property.features.split('\n').filter(f => f.trim()).map((feature, i) => (
                                    <li key={i} className="flex items-start gap-3 text-slate-700 text-lg">
                                        <span className="w-2 h-2 bg-blue-600 mt-2.5 shrink-0"></span>
                                        {feature}
                                    </li>
                                ))}
                            </ul>
                        </div>
                        <TemplateFooter agent={agent} page="Page 01" theme="light" />
                    </div>
                </div>
                {/* Page 2 */}
                <GalleryPage images={images} title={property.title} agent={agent} language={language} font="sans" theme="light" />
            </>
        );

        const LuxuryTemplate = ({ property, images, agent, language = 'en', listingType, propertyType }) => (
            <>
                <div className="pdf-page bg-slate-900 text-white flex flex-col font-serif relative border-8 border-slate-900">
                    <div className="absolute inset-4 border border-amber-500/30 pointer-events-none"></div>
                    <div className="p-12 pb-6 text-center z-10">
                         <h1 className="text-4xl text-amber-500 tracking-widest uppercase mb-2">{property.title}</h1>
                         <p className="text-slate-400 italic tracking-wide text-lg">{property.address}</p>
                    </div>
                    <div className="h-[45%] w-full relative mx-auto px-12">
                         <div className="w-full h-full border-2 border-amber-500/50 p-1 relative">
                            <CoverBadge listingType={listingType} propertyType={propertyType} language={language} dark={true} />
                            <img src={images[0]} alt="Main" className="w-full h-full object-cover" />
                        </div>
                    </div>
                    <div className="p-12 pt-8 flex-1 flex flex-col">
                        <div className="flex justify-center items-center gap-8 mb-8">
                             <div className="h-px bg-amber-500/50 flex-1"></div>
                             <h2 className="text-5xl text-white font-light">{property.price}</h2>
                             <div className="h-px bg-amber-500/50 flex-1"></div>
                        </div>
                         <div className="text-slate-300 flex-1">
                             <h3 className="text-xl text-amber-500 mb-6 uppercase tracking-widest border-b border-amber-500/20 pb-2">{t(language, 'details')}</h3>
                             <p className="text-2xl mb-6 font-light text-white">{property.size}</p>
                             <ul className="grid grid-cols-2 gap-4">
                                {property.features.split('\n').filter(f => f.trim()).map((feature, i) => (
                                    <li key={i} className="flex items-center gap-3 text-lg font-light">
                                        <span className="text-amber-500">♦</span> {feature}
                                    </li>
                                ))}
                            </ul>
                         </div>
                         <TemplateFooter agent={agent} page="Page 01" theme="dark" />
                    </div>
                </div>
                <GalleryPage images={images} title={property.title} agent={agent} language={language} font="serif" theme="dark" />
            </>
        );

        const MinimalistTemplate = ({ property, images, agent, language = 'en', listingType, propertyType }) => (
            <>
                <div className="pdf-page bg-white text-slate-800 flex flex-col font-sans p-12">
                     <div className="flex-1 grid grid-cols-12 grid-rows-6 gap-6">
                         <div className="col-span-12 row-span-1 flex flex-col justify-end pb-6 border-b border-slate-200">
                             <div className="flex justify-between items-end">
                                 <div>
                                     <h1 className="text-3xl font-light tracking-wide uppercase mb-1">{property.title}</h1>
                                     <p className="text-slate-500">{property.address}</p>
                                 </div>
                                 <h2 className="text-4xl font-light">{property.price}</h2>
                             </div>
                         </div>
                         <div className="col-span-8 row-span-5 bg-slate-50 relative group overflow-hidden">
                             <CoverBadge listingType={listingType} propertyType={propertyType} language={language} dark={false} />
                             <img src={images[0]} alt="Main" className="w-full h-full object-cover" />
                         </div>
                         <div className="col-span-4 row-span-5 flex flex-col pl-4">
                             <div className="mb-auto">
                                 <p className="text-xl font-medium mb-6">{property.size}</p>
                                 <div className="space-y-3 text-sm text-slate-600">
                                     {property.features.split('\n').filter(f => f.trim()).map((feature, i) => (
                                        <p key={i} className="border-l-2 border-slate-300 pl-4 py-1">{feature}</p>
                                    ))}
                                 </div>
                             </div>
                             <TemplateFooter agent={agent} page="Page 01" theme="light" />
                         </div>
                     </div>
                </div>
                <GalleryPage images={images} title={property.title} agent={agent} language={language} font="sans" theme="light" />
            </>
        );

        const ClassicTemplate = ({ property, images, agent, language = 'en', listingType, propertyType }) => (
            <>
                <div className="pdf-page bg-[#Fdfbf7] text-stone-800 flex flex-col font-classic p-8 border-[12px] border-stone-200">
                    <div className="border border-stone-800 h-full flex flex-col p-8 relative">
                         {/* Ornaments */}
                         <div className="absolute top-2 left-2 w-4 h-4 border-t-2 border-l-2 border-stone-800"></div>
                         <div className="absolute top-2 right-2 w-4 h-4 border-t-2 border-r-2 border-stone-800"></div>
                         <div className="absolute bottom-2 left-2 w-4 h-4 border-b-2 border-l-2 border-stone-800"></div>
                         <div className="absolute bottom-2 right-2 w-4 h-4 border-b-2 border-r-2 border-stone-800"></div>

                        <div className="text-center mb-8">
                             <h2 className="text-3xl font-bold border-b-2 border-stone-300 inline-block pb-2 mb-2 uppercase">{property.title}</h2>
                             <p className="text-stone-500 font-serif italic">{property.address}</p>
                        </div>
                        <div className="flex-1 flex flex-col gap-6">
                            <div className="h-[50%] bg-stone-100 border border-stone-300 p-2 relative">
                                    <CoverBadge listingType={listingType} propertyType={propertyType} language={language} dark={false} />
                                    <img src={images[0]} alt="Main" className="w-full h-full object-cover grayscale-[20%]" />
                            </div>
                            <div className="flex flex-col justify-center text-center mt-4 flex-1">
                                 <div className="mb-8">
                                     <p className="text-sm uppercase tracking-widest text-stone-400 mb-1">{t(language, 'offeredAt')}</p>
                                     <p className="text-4xl font-bold text-stone-800">{property.price}</p>
                                 </div>
                                 <div className="mb-8">
                                     <p className="text-sm uppercase tracking-widest text-stone-400 mb-1">{t(language, 'details')}</p>
                                     <p className="font-serif text-xl">{property.size}</p>
                                 </div>
                                 <div className="text-left max-w-md mx-auto">
                                     <p className="text-center text-sm uppercase tracking-widest text-stone-400 mb-3">{t(language, 'features')}</p>
                                     <ul className="space-y-2 font-serif text-sm grid grid-cols-2 gap-x-8">
                                         {property.features.split('\n').filter(f => f.trim()).map((f, i) => (
                                             <li key={i} className="list-disc list-inside">{f}</li>
                                         ))}
                                     </ul>
                                 </div>
                            </div>
                            <TemplateFooter agent={agent} page="Page 01" theme="light" />
                        </div>
                    </div>
                </div>
                <GalleryPage images={images} title={property.title} agent={agent} language={language} font="classic" theme="light" />
            </>
        );

        const IndustrialTemplate = ({ property, images, agent, language = 'en', listingType, propertyType }) => (
            <>
                <div className="pdf-page bg-zinc-900 text-zinc-100 flex flex-col font-mono p-4">
                    <div className="border-4 border-zinc-700 h-full flex flex-col">
                        <div className="bg-zinc-800 p-6 border-b-4 border-zinc-700 flex justify-between items-center">
                            <div>
                                <h1 className="text-2xl font-bold uppercase tracking-tighter text-yellow-500 mb-1">// {property.title}</h1>
                                <p className="text-xs text-zinc-400 uppercase tracking-widest">LOC: {property.address}</p>
                            </div>
                            <div className="text-right">
                                <div className="text-xs text-zinc-500 uppercase">{t(language, 'valuation')}</div>
                                <div className="text-3xl font-bold text-white">{property.price}</div>
                            </div>
                        </div>
                        <div className="flex-1 p-6 flex flex-col gap-6">
                            <div className="h-[55%] relative group">
                                <div className="absolute top-2 left-2 bg-yellow-500 text-black text-xs font-bold px-2 py-1">IMG_001</div>
                                <CoverBadge listingType={listingType} propertyType={propertyType} language={language} dark={true} />
                                <img src={images[0]} alt="Main" className="w-full h-full object-cover border-2 border-zinc-600 grayscale hover:grayscale-0 transition-all duration-300" />
                            </div>
                            <div className="flex-1">
                                <div className="mb-6 p-4 border-2 border-zinc-700 bg-zinc-800/50 h-full">
                                    <h3 className="text-yellow-500 font-bold mb-4 uppercase text-sm border-b border-zinc-600 pb-2">{t(language, 'specsSheet')}</h3>
                                    <p className="text-lg mb-4">> {property.size}</p>
                                    <div className="grid grid-cols-2 gap-4 text-sm text-zinc-300">
                                        {property.features.split('\n').filter(f => f.trim()).map((f, i) => (
                                            <div key={i} className="flex items-center gap-2">
                                                <span className="text-yellow-500">[+]</span> {f}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div className="bg-zinc-800 p-2">
                            <TemplateFooter agent={agent} page="Page 01" theme="dark" />
                        </div>
                    </div>
                </div>
                <GalleryPage images={images} title={property.title} agent={agent} language={language} font="mono" theme="dark" />
            </>
        );

        const ScandinavianTemplate = ({ property, images, agent, language = 'en', listingType, propertyType }) => (
            <>
                <div className="pdf-page bg-[#f8fafc] text-slate-700 flex flex-col font-sans">
                    <div className="p-8 text-center bg-white border-b border-slate-100">
                        <h1 className="text-3xl font-light tracking-widest uppercase text-slate-800 mb-1">{property.title}</h1>
                        <p className="text-sm text-slate-400 font-medium tracking-wide">{property.address}</p>
                    </div>
                    <div className="flex-1 p-8 flex flex-col">
                        <div className="grid grid-cols-12 gap-8 content-start flex-1">
                            <div className="col-span-12 h-[55%] rounded-2xl overflow-hidden shadow-sm relative">
                                <CoverBadge listingType={listingType} propertyType={propertyType} language={language} dark={false} />
                                <img src={images[0]} alt="Main" className="w-full h-full object-cover" />
                            </div>
                            <div className="col-span-12 bg-white rounded-2xl p-8 shadow-sm grid grid-cols-2 gap-8">
                                <div>
                                    <div className="mb-6">
                                        <p className="text-xs uppercase text-slate-400 font-bold mb-2">{t(language, 'priceLabel')}</p>
                                        <h2 className="text-4xl font-normal text-slate-900">{property.price}</h2>
                                    </div>
                                    <div>
                                        <p className="text-xs uppercase text-slate-400 font-bold mb-2">{t(language, 'details')}</p>
                                        <p className="text-xl text-slate-800">{property.size}</p>
                                    </div>
                                </div>
                                <div>
                                    <p className="text-xs uppercase text-slate-400 font-bold mb-2">{t(language, 'features')}</p>
                                    <ul className="space-y-2">
                                        {property.features.split('\n').filter(f => f.trim()).map((f, i) => (
                                            <li key={i} className="text-sm text-slate-600 flex items-center gap-2">
                                                <span className="w-1.5 h-1.5 rounded-full bg-slate-300"></span> {f}
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                            </div>
                        </div>
                        <TemplateFooter agent={agent} page="Page 01" theme="light" />
                    </div>
                </div>
                <GalleryPage images={images} title={property.title} agent={agent} language={language} font="sans" theme="light" />
            </>
        );

        const UrbanLoftTemplate = ({ property, images, agent, language = 'en', listingType, propertyType }) => (
            <>
                <div className="pdf-page bg-[#e5e5e5] text-black flex flex-col font-urban relative">
                    <div className="absolute top-0 right-0 w-1/3 h-full bg-[#1a1a1a] -z-[1]" style={{ clipPath: 'polygon(20% 0, 100% 0, 100% 100%, 0 100%)' }}></div>
                    <div className="z-10 p-10 h-full flex flex-col min-w-0">
                        <div className="bg-white p-8 shadow-2xl mb-6 max-w-2xl border-l-8 border-[#ff4d4d]">
                            <h1 className="text-5xl font-bold uppercase leading-none mb-2">{property.title}</h1>
                            <p className="text-xl font-bold text-[#ff4d4d]">{property.price}</p>
                        </div>
                        <div className="flex-1 flex flex-col gap-6">
                             <div className="h-[55%] border-4 border-black p-2 bg-white transform -rotate-1 shadow-xl relative">
                                <CoverBadge listingType={listingType} propertyType={propertyType} language={language} dark={false} />
                                <img src={images[0]} alt="Main" className="w-full h-full object-cover grayscale contrast-125" />
                            </div>
                            <div className="bg-black text-white p-8 shadow-xl flex-1 flex flex-col min-w-0 overflow-visible">
                                <div className="flex flex-wrap gap-4 justify-between items-start mb-6 min-w-0">
                                    <div className="min-w-0 flex-1">
                                        <h3 className="text-2xl font-bold uppercase border-b-2 border-[#ff4d4d] inline-block mb-2">{t(language, 'specs')}</h3>
                                        <p className="text-xl break-words">{property.size}</p>
                                    </div>
                                    <div className="text-right min-w-0 flex-shrink-0">
                                        <p className="text-sm font-bold text-gray-500 uppercase">{t(language, 'location')}</p>
                                        <p className="text-lg font-bold break-words">{property.address}</p>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-x-6 gap-y-2 text-sm text-gray-300 mb-auto min-w-0">
                                    {property.features.split('\n').filter(f => f.trim()).map((f, i) => (
                                        <p key={i} className="break-words overflow-visible">/ {f}</p>
                                    ))}
                                </div>
                                <TemplateFooter agent={agent} page="Page 01" theme="dark" />
                            </div>
                        </div>
                    </div>
                </div>
                <GalleryPage images={images} title={property.title} agent={agent} language={language} font="urban" theme="light" />
            </>
        );

        const MagazineTemplate = ({ property, images, agent, language = 'en', listingType, propertyType }) => (
            <>
                <div className="pdf-page bg-white text-black flex flex-col font-serif overflow-hidden relative">
                    <div className="absolute top-0 right-0 w-[55%] h-full">
                        <CoverBadge listingType={listingType} propertyType={propertyType} language={language} dark={false} />
                        <img src={images[0]} alt="Main" className="w-full h-full object-cover" />
                    </div>
                    <div className="w-[50%] h-full bg-white z-10 flex flex-col p-12 pr-0 relative justify-center">
                        <div className="mr-[-100px] z-20 mix-blend-multiply mb-12">
                            <h1 className="text-8xl italic font-black leading-tight text-black mb-6">
                                {property.title.split(' ')[0]} <br />
                                <span className="text-7xl font-normal not-italic text-gray-800">
                                    {property.title.split(' ').slice(1).join(' ')}
                                </span>
                            </h1>
                        </div>
                        <div className="pr-12">
                             <div className="w-24 h-2 bg-black mb-8"></div>
                             <p className="text-3xl font-bold mb-2">{property.price}</p>
                             <p className="text-gray-500 italic mb-8 text-xl">{property.address}</p>
                             <p className="text-xl leading-relaxed font-sans text-gray-700 mb-8 border-l-4 border-gray-200 pl-6">
                                {property.size}
                             </p>
                             <div className="grid grid-cols-1 gap-4 font-sans text-sm tracking-wide uppercase">
                                {property.features.split('\n').filter(f => f.trim()).map((f, i) => (
                                    <div key={i} className="flex items-center gap-3">
                                        <span className="text-xs text-gray-400">0{i+1}</span> {f}
                                    </div>
                                ))}
                             </div>
                        </div>
                    </div>
                </div>
                <GalleryPage images={images} title={property.title} agent={agent} language={language} font="serif" theme="light" />
            </>
        );

        // --- UI Components ---

        const LISTING_TYPES = [
            { id: 'sale', en: 'For Sale', tr: 'Satılık', ar: 'للبيع', ru: 'Продажа', de: 'Zu verkaufen', it: 'In vendita', es: 'En venta', zh: '出售' },
            { id: 'rent', en: 'For Rent', tr: 'Kiralık', ar: 'للإيجار', ru: 'Аренда', de: 'Zu vermieten', it: 'Affitto', es: 'Alquiler', zh: '出租' }
        ];
        const PROPERTY_TYPES = [

            // Scaling Logic (Fit to Screen / Side-by-Side)
            useEffect(() => {
                const handleResize = () => {
                    if (previewRef.current) {
                        const parentH = previewRef.current.clientHeight - 48; // 24px padding top/bottom
                        const parentW = previewRef.current.clientWidth - 48; // 24px padding left/right
                        const pageH = 1123; 
                        const pageW = 794;
                        const gap = 32; // Gap between pages
                        
                        // Calculate scale to fit 2 pages side-by-side
                        // 1. Fit Height: Scale based on full A4 height
                        const scaleFitHeight = parentH / pageH;
                        
                        // 2. Fit Width: Scale based on (2 * Width + Gap)
                        const scaleFitWidth = parentW / ((pageW * 2) + gap);
                        
                        // Choose the smaller scale to ensure EVERYTHING fits
                        // But if screen is too narrow (mobile), fall back to single page stack logic
                        let newScale;
                        if (parentW < 800) {
                             // Mobile/Narrow: Stacked, fit width
                             newScale = parentW / pageW;
                        } else {
                             // Desktop: Side-by-side, fit both dimensions
                             newScale = Math.min(scaleFitHeight, scaleFitWidth, 1.0);
                        }

                        setScale(newScale);
                        setWindowWidth(window.innerWidth);
                    }
                };
                if (typeof window !== 'undefined') setWindowWidth(window.innerWidth);
                window.addEventListener('resize', handleResize);
                setTimeout(handleResize, 100);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            // PDF Generation - always captures at full A4 (794x1123) regardless of device
            const generatePDF = async () => {
                setIsGenerating(true);
                setProgress(10);
                
                try {
                    const pages = document.querySelectorAll('.pdf-page');
                    const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
                    const pdfW = pdf.internal.pageSize.getWidth();
                    const pdfH = pdf.internal.pageSize.getHeight();

                    const wrapper = document.createElement('div');
                    wrapper.style.cssText = 'position:fixed;top:0;left:0;width:794px;height:1123px;z-index:-99999;pointer-events:none;overflow:hidden;';
                    document.body.appendChild(wrapper);

                    for (let i = 0; i < pages.length; i++) {
                        const clone = pages[i].cloneNode(true);
                        clone.style.cssText = 'width:794px!important;height:1123px!important;min-width:794px!important;min-height:1123px!important;transform:none!important;position:absolute!important;top:0!important;left:0!important;';
                        wrapper.appendChild(clone);

                        const canvas = await html2canvas(clone, {
                            scale: 2,
                            logging: false,
                            useCORS: true
                        });
                        
                        wrapper.removeChild(clone);

                        const imgData = canvas.toDataURL('image/jpeg', 0.95);
                        if (i > 0) pdf.addPage();
                        pdf.addImage(imgData, 'JPEG', 0, 0, pdfW, pdfH);
                        
                        setProgress(10 + Math.round(((i + 1) / pages.length) * 80));
                    }
                    if (wrapper.parentNode) document.body.removeChild(wrapper);
                    
                    pdf.save(`RealShow-${property.title.replace(/\s+/g, '-')}.pdf`);
                    setProgress(100);
                } catch (err) {
                    console.error(err);
                    alert("Failed to generate PDF");
                    const w = document.querySelector('div[style*="-99999"]');
                    if (w?.parentNode) w.parentNode.removeChild(w);
                } finally {
                    setTimeout(() => {
                        setIsGenerating(false);
                        setProgress(0);
                    }, 500);
                }
            };

            const readFileAsDataURL = (file) => new Promise((resolve, reject) => {
                const r = new FileReader();
                r.onloadend = () => resolve(r.result);
                r.onerror = () => reject(new Error('Read failed'));
                r.readAsDataURL(file);
            });

            // Single-slot upload (tekil yükleme)
            const handleImageUpload = (e, index) => {
                const file = e.target.files[0];
                if (!file) return;
                readFileAsDataURL(file).then((result) => {
                    setImages(prev => {
                        const newImages = [...prev];
                        while (newImages.length <= index) newImages.push(null);
                        newImages[index] = result;
                        return newImages;
                    });
                });
                e.target.value = '';
            };

            // Bulk upload (toplu yükleme) - first file = cover, next 7 = gallery
            const handleBulkUpload = async (e) => {
                const files = e.target.files;
                if (!files?.length) return;
                const count = Math.min(9, files.length);
                const results = [];
                for (let i = 0; i < count; i++) {
                    const data = await readFileAsDataURL(files[i]);
                    results.push(data);
                }
                setImages(results);
                e.target.value = '';
            };

            const removeImage = (idx) => {
                setImages(prev => {
                    const newImages = [...prev];
                    newImages[idx] = null; // Clear the slot, don't shift others to keep layout consistent?
                    // Actually, shifting might be better for "gallery", but user wants specific slots.
                    // Let's Keep it consistent: Clear slot = null.
                    // But templates expect compact array usually.
                    // Let's filter out nulls for rendering, but keep slots in UI?
                    // No, simpler: User wants to know "Where it goes". 
                    // Slot 1 = Cover. Slot 2 = Gallery 1.
                    // If I delete Slot 2, Slot 3 becomes Gallery 1? 
                    // Let's keep it fluid (remove splice) for now, but label the inputs clearly.
                    // "Slot 1 (Cover)", "Slot 2", etc.
                    return newImages.filter((_, i) => i !== idx); 
                });
            };

            const handleSelectLanguage = (code) => {
                setLanguage(code);
                setShowLanguageDialog(false);
                try {
                    window.localStorage.setItem('realshow_language', code);
                } catch (e) {}
            };

            const handleTranslateContent = async () => {
                if (isTranslating || !translateTarget || translateTarget === language) return;

                setIsTranslating(true);
                try {
                    const texts = [
                        property.title,
                        property.address,
                        property.size,
                        property.features,
                        agent.name,
                        agent.phone,
                        agent.website
                    ];

                    const res = await fetch('/api/translate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            texts,
                            sourceLang: language,
                            targetLang: translateTarget
                        })
                    });

                    if (!res.ok) {
                        throw new Error('Failed to translate');
                    }

                    const data = await res.json();
                    const out = data.translations || texts;

                    setProperty({
                        ...property,
                        title: out[0],
                        address: out[1],
                        size: out[2],
                        features: out[3]
                    });
                    setAgent({
                        ...agent,
                        name: out[4],
                        phone: out[5],
                        website: out[6]
                    });

                    setLanguage(translateTarget);
                    try {
                        window.localStorage.setItem('realshow_language', translateTarget);
                    } catch (e) {}
                } catch (e) {
                    console.error(e);
                    alert('Translation failed');
                } finally {
                    setIsTranslating(false);
                }
            };

            return (
                <div className="flex flex-col md:flex-row min-h-screen md:h-screen bg-slate-950 text-slate-100 font-sans overflow-y-auto md:overflow-hidden">
                    
                    {/* --- Sidebar (Dashboard) --- */}
                    <div className="w-full md:w-[400px] md:max-h-screen bg-slate-900 border-r border-slate-800 flex flex-col z-20 shadow-2xl shrink-0">
                        {/* Header */}
                        <div className="p-4 sm:p-6 border-b border-slate-800 bg-slate-900 z-10 sticky top-0">
                            <div className="flex items-center gap-3 mb-6">
                                <div className="bg-blue-600 p-2 rounded-lg">
                                    <Home className="w-6 h-6 text-white" />
                                </div>
                                <div>
                                    <h1 className="text-xl font-bold tracking-tight">{t(language, 'appName')}</h1>
                                    <p className="text-xs text-slate-400">{t(language, 'subtitle')}</p>
                                </div>
                            </div>

                            {/* Template Showcase Gallery */}
                            <div className="mb-6">
                                <label className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3 flex items-center justify-between">
                                    <span>{t(language, 'selectTemplate')}</span>
                                    <span className="text-[10px] text-blue-400 font-normal">{templates.find(t => t.id === template)?.name}</span>
                                </label>
                                <div className="grid grid-cols-4 gap-2 sm:gap-3">
                                    {templates.map(t => (
                                        <TemplateThumbnail 
                                            key={t.id}
                                            id={t.id}
                                            name={t.name}
                                            isActive={template === t.id}
                                            onClick={() => setTemplate(t.id)}
                                        />
                                    ))}
                                </div>
                            </div>

                             {/* Action Button */}
                             <button 
                                onClick={generatePDF}
                                disabled={isGenerating}
                                className="w-full bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-lg font-bold flex items-center justify-center gap-2 transition-all shadow-lg active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed overflow-hidden relative"
                             >
                                {isGenerating ? (
                                    <>
                                        <Loader2 className="w-5 h-5 animate-spin" />
                                        <span>{t(language, 'processing')} {progress}%</span>
                                        <div className="absolute bottom-0 left-0 h-1 bg-blue-300 transition-all duration-300" style={{ width: `${progress}%` }}></div>
                                    </>
                                ) : (
                                    <><Download className="w-5 h-5" /> {t(language, 'downloadPdf')}</>
                                )}
                             </button>
                        </div>

                        {/* Scrollable Form Area */}
                        <div className="flex-1 overflow-y-auto p-4 sm:p-6 space-y-6 sm:space-y-8">
                             {/* Photos (Fixed Slots) */}
                             <div className="space-y-4">
                                <div className="flex justify-between items-center flex-wrap gap-2">
                                    <h2 className="text-sm font-bold text-slate-200 flex items-center gap-2">
                                        <ImageIcon className="w-4 h-4" /> {t(language, 'propertyImages')}
                                    </h2>
                                    <span className="text-xs text-slate-500">{images.length}/9 {t(language, 'slotsUsed')}</span>
                                </div>
                                <div className="flex gap-2">
                                    <label className="flex-1 cursor-pointer">
                                        <span className="flex items-center justify-center gap-2 px-3 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 text-slate-200 text-xs font-medium transition-colors">
                                            <Upload className="w-4 h-4" /> {t(language, 'uploadBulk')}
                                        </span>
                                        <input type="file" accept="image/*" multiple onChange={handleBulkUpload} className="hidden" />
                                    </label>
                                    <span className="text-[10px] text-slate-500 self-center hidden sm:inline">{t(language, 'uploadBulkHint')}</span>
                                </div>
                                {/* Cover Image Slot (Larger) */}
                                <div className="space-y-2">
                                    <label className="text-[10px] uppercase font-bold text-blue-400 block mb-1">
                                        {t(language, 'coverImage')}
                                    </label>
                                    <div className="w-full aspect-video relative rounded-lg border-2 border-blue-500/50 bg-slate-800 overflow-hidden group">
                                        {images[0] ? (
                                            <>
                                                <img src={images[0]} alt="Cover" className="w-full h-full object-cover" />
                                                <div className="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-2">
                                                    <button onClick={() => removeImage(0)} className="p-2 bg-red-600 rounded-full text-white hover:bg-red-700"><X className="w-4 h-4" /></button>
                                                </div>
                                            </>
                                        ) : (
                                            <div className="flex flex-col items-center justify-center h-full text-slate-500">
                                                <Upload className="w-8 h-8 mb-2 opacity-50" />
                                                <span className="text-xs">{t(language, 'uploadCover')}</span>
                                                <input type="file" accept="image/*" onChange={(e) => handleImageUpload(e, 0)} className="absolute inset-0 opacity-0 cursor-pointer" />
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* Gallery Grid (Remaining 7 Slots) */}
                                <div>
                                    <label className="text-[10px] uppercase font-bold text-slate-500 block mb-2">
                                        {t(language, 'galleryPhotos')}
                                    </label>
                                    <div className="grid grid-cols-4 gap-1.5 sm:gap-2">
                                        {[1, 2, 3, 4, 5, 6, 7, 8].map((slotIndex) => (
                                            <div key={slotIndex} className="aspect-square relative rounded-md border border-slate-700 bg-slate-800 overflow-hidden group hover:border-slate-500 transition-colors">
                                                {images[slotIndex] ? (
                                                    <>
                                                        <img src={images[slotIndex]} alt={`Slot ${slotIndex}`} className="w-full h-full object-cover" />
                                                        <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                                            <button onClick={() => removeImage(slotIndex)} className="p-1 bg-red-500/80 rounded-full text-white"><X className="w-3 h-3" /></button>
                                                        </div>
                                                        <span className="absolute bottom-0 right-0 bg-black/70 text-[8px] text-white px-1">{slotIndex+1}</span>
                                                    </>
                                                ) : (
                                                    <div className="flex flex-col items-center justify-center h-full text-slate-600">
                                                        <span className="text-[10px] font-bold opacity-50">{slotIndex+1}</span>
                                                        <input type="file" accept="image/*" onChange={(e) => handleImageUpload(e, slotIndex)} className="absolute inset-0 opacity-0 cursor-pointer" />
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                             </div>

                             <div className="border-t border-slate-800"></div>

                             {/* Details */}
                             <div className="space-y-4">
                                <h2 className="text-sm font-bold text-slate-200 flex items-center gap-2">
                                    <FileText className="w-4 h-4" /> {t(language, 'propertyDetails')}
                                </h2>
                                <div className="space-y-3">
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                        <div>
                                            <label className="text-[10px] uppercase font-bold text-slate-500 mb-1 block">{t(language, 'listingType')}</label>
                                            <select value={listingType} onChange={e => setListingType(e.target.value)} className="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500">
                                                {LISTING_TYPES.map(l => <option key={l.id} value={l.id}>{l[language] || l.en}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-[10px] uppercase font-bold text-slate-500 mb-1 block">{t(language, 'propertyType')}</label>
                                            <select value={propertyType} onChange={e => setPropertyType(e.target.value)} className="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500">
                                                {PROPERTY_TYPES.map(p => <option key={p.id} value={p.id}>{p[language] || p.en}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    {['title', 'price', 'address', 'size'].map(field => (
                                        <div key={field}>
                                            <label className="text-[10px] uppercase font-bold text-slate-500 mb-1 block">{field}</label>
                                            <input 
                                                type="text"
                                                value={property[field]}
                                                onChange={e => setProperty({...property, [field]: e.target.value})}
                                                className="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500 transition-colors"
                                            />
                                        </div>
                                    ))}
                                    <div>
                                        <label className="text-[10px] uppercase font-bold text-slate-500 mb-1 block">{t(language, 'features')}</label>
                                        <textarea
                                            rows="5"
                                            value={property.features}
                                            onChange={e => setProperty({...property, features: e.target.value})}
                                            className="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500 transition-colors"
                                        ></textarea>
                                    </div>
                                </div>
                             </div>

                             <div className="border-t border-slate-800"></div>

                             {/* Agent Info (Optional) */}
                             <div className="space-y-4">
                                <h2 className="text-sm font-bold text-slate-200 flex items-center gap-2">
                                    <span className="bg-slate-800 p-1 rounded"><Layout className="w-3 h-3" /></span> {t(language, 'agentInfo')}
                                </h2>
                                <div className="space-y-3">
                                    <div>
                                        <label className="text-[10px] uppercase font-bold text-slate-500 mb-1 block">{t(language, 'nameAgency')}</label>
                                        <input 
                                            type="text"
                                            value={agent.name}
                                            onChange={e => setAgent({...agent, name: e.target.value})}
                                            placeholder="e.g. John Doe"
                                            className="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500 transition-colors"
                                        />
                                    </div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                        <div>
                                            <label className="text-[10px] uppercase font-bold text-slate-500 mb-1 block">{t(language, 'phone')}</label>
                                            <input 
                                                type="text"
                                                value={agent.phone}
                                                onChange={e => setAgent({...agent, phone: e.target.value})}
                                                placeholder="555-0123"
                                                className="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500 transition-colors"
                                            />
                                        </div>
                                        <div>
                                            <label className="text-[10px] uppercase font-bold text-slate-500 mb-1 block">{t(language, 'website')}</label>
                                            <input 
                                                type="text"
                                                value={agent.website}
                                                onChange={e => setAgent({...agent, website: e.target.value})}
                                                placeholder="agency.com"
                                                className="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500 transition-colors"
                                            />
                                        </div>
                                    </div>
                                </div>
                             </div>
                        </div>
                    </div>

                    {/* --- Preview Area --- */}
                    <div ref={previewRef} className="flex-1 min-h-[60vh] md:min-h-0 md:h-full bg-slate-950 overflow-auto md:overflow-hidden flex items-center justify-center relative p-4 md:p-6">
                        {/* Container - single column on narrow, side-by-side on wide */}
                        <div 
                            style={{ 
                                transform: `scale(${scale})`, 
                                transformOrigin: 'center center',
                                width: windowWidth < 900 ? '794px' : '1620px',
                                transition: 'transform 0.2s ease'
                            }}
                            className="flex flex-row flex-wrap justify-center gap-4 md:gap-8 shrink-0 items-center"
                        >
                             {/* Render selected template (contains Page 1 and Page 2) */}
                            {template === 'modernist' && <ModernistTemplate property={property} images={currentImages} agent={agent} language={language} listingType={listingType} propertyType={propertyType} />}
                            {template === 'luxury' && <LuxuryTemplate property={property} images={currentImages} agent={agent} language={language} listingType={listingType} propertyType={propertyType} />}
                            {template === 'minimalist' && <MinimalistTemplate property={property} images={currentImages} agent={agent} language={language} listingType={listingType} propertyType={propertyType} />}
                            {template === 'classic' && <ClassicTemplate property={property} images={currentImages} agent={agent} language={language} listingType={listingType} propertyType={propertyType} />}
                            {template === 'industrial' && <IndustrialTemplate property={property} images={currentImages} agent={agent} language={language} listingType={listingType} propertyType={propertyType} />}
                            {template === 'scandinavian' && <ScandinavianTemplate property={property} images={currentImages} agent={agent} language={language} listingType={listingType} propertyType={propertyType} />}
                            {template === 'urban' && <UrbanLoftTemplate property={property} images={currentImages} agent={agent} language={language} listingType={listingType} propertyType={propertyType} />}
                            {template === 'magazine' && <MagazineTemplate property={property} images={currentImages} agent={agent} language={language} listingType={listingType} propertyType={propertyType} />}
                        </div>
                        
                        {/* Zoom Indicator - hidden on very small screens */}
                        <div className="hidden sm:flex fixed bottom-6 right-6 bg-slate-800/80 backdrop-blur text-white px-4 py-2 rounded-full text-xs font-mono border border-slate-700 shadow-lg pointer-events-none" style={{ marginBottom: 'env(safe-area-inset-bottom)' }}>
                            Fit: {Math.round(scale * 100)}%
                        </div>

                        {/* Language chooser overlay on first visit */}
                        {showLanguageDialog && (
                            <div className="absolute inset-0 bg-slate-950/80 backdrop-blur flex items-center justify-center z-30">
                                <div className="bg-slate-900 border border-slate-700 rounded-2xl p-6 sm:p-8 max-w-lg w-full mx-4 max-h-[90vh] overflow-y-auto shadow-2xl">
                                    <h2 className="text-xl font-bold mb-2">{t(language, 'languageTitle')}</h2>
                                    <p className="text-sm text-slate-400 mb-6">
                                        {t(language, 'languageSubtitle')}
                                    </p>
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
                                        {LANGUAGES.map(l => (
                                            <button
                                                key={l.code}
                                                onClick={() => handleSelectLanguage(l.code)}
                                                className={`px-3 py-2 rounded-lg text-sm border text-left transition-all ${
                                                    language === l.code
                                                        ? 'bg-blue-600 border-blue-500 text-white'
                                                        : 'bg-slate-800 border-slate-700 hover:border-blue-500 hover:text-blue-300'
                                                }`}
                                            >
                                                {l.label}
                                            </button>
                                        ))}
                                    </div>
                                    <p className="text-[11px] text-slate-500">
                                        {t(language, 'startInLanguage')}
                                    </p>
                                </div>
                            </div>
                        )}

                        {/* In-app translate controls - bottom on mobile for easier reach */}
                        <div className="fixed bottom-4 left-2 right-2 md:left-auto md:right-6 md:top-6 md:bottom-auto flex justify-center md:justify-end bg-slate-900/95 border border-slate-700 rounded-xl md:rounded-full px-3 py-2 flex-wrap items-center gap-2 text-xs shadow-lg" style={{ marginBottom: 'max(env(safe-area-inset-bottom), 0.5rem)' }}>
                            <span className="text-slate-400">{t(language, 'translatePdfLabel')}:</span>
                            <select
                                value={translateTarget}
                                onChange={e => setTranslateTarget(e.target.value)}
                                className="bg-slate-800 border border-slate-700 rounded-full px-2 py-1 text-xs focus:outline-none focus:border-blue-500"
                            >
                                {LANGUAGES.map(l => (
                                    <option key={l.code} value={l.code}>
                                        {l.label}
                                    </option>
                                ))}
                            </select>
                            <button
                                onClick={handleTranslateContent}
                                disabled={isTranslating}
                                className="bg-blue-600 hover:bg-blue-500 disabled:opacity-50 disabled:cursor-not-allowed text-white px-3 py-1 rounded-full font-semibold text-[11px] flex items-center gap-1"
                            >
                                {isTranslating ? t(language, 'translating') : t(language, 'translateButton')}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
